name: Daily Dev Digest

on:
  schedule:
    # 每天 UTC 01:00（北京时间 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIGEST_MAX_AGE_HOURS: "48"
          DIGEST_MAX_PER_CATEGORY: "12"
        run: python3 scripts/collect_digest.py

      - name: Commit data archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(digest): update daily dev news $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "deploy: daily digest pages"
