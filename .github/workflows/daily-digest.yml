name: Daily Dev Digest

on:
  schedule:
    # 每天 UTC 01:00（北京时间 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/daily-digest.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIGEST_MAX_AGE_HOURS: "48"
          DIGEST_MAX_PER_CATEGORY: "12"
        run: python3 scripts/collect_digest.py

      - name: Commit data archive
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            git commit -m "chore(digest): update daily dev news $(date -u +%Y-%m-%d)"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages (first run)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "GitHub Pages already enabled"
          else
            echo "Trying to enable GitHub Pages (workflow source)..."
            gh api --method POST "repos/${{ github.repository }}/pages" \
              -f build_type=workflow || \
            gh api --method POST "repos/${{ github.repository }}/pages" \
              -f 'source[branch]=gh-pages' -f 'source[path]=/'
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Fallback deploy to gh-pages branch
        if: steps.deployment.outcome != 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "deploy: daily digest pages"
