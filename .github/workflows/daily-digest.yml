name: Daily Dev Digest

on:
  schedule:
    # 每天 UTC 01:00（北京时间 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/daily-digest.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Collect digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIGEST_MAX_AGE_HOURS: "48"
          DIGEST_MAX_PER_CATEGORY: "12"
        run: python3 scripts/collect_digest.py

      - name: Commit data archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(digest): update daily dev news $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy-pages:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          commit_message: "deploy: daily digest pages"

      - name: Try GitHub Actions Pages deploy
        continue-on-error: true
        id: actions_deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "Pages not enabled yet — skip Actions deploy"
            exit 0
          fi
          echo "Pages enabled, attempting Actions deploy..."

      - name: Setup Pages
        if: steps.actions_deploy.outcome == 'success'
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.actions_deploy.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: steps.actions_deploy.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4
